<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿伯一次買購</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Huninn&display=swap" rel="stylesheet">
<style>
:root{--accent:#c9899f;--accent-soft:#f6e9ee;--line:#ead9e0;--ink:#5c4a52;--ink-soft:#a08b94;--paper:#fff;--cream:#f9eff3;--fs:13px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Huninn','Yuanti TC','Microsoft JhengHei',sans-serif;background:#fbf6f8;color:var(--ink);line-height:1.6;font-size:var(--fs)}
@media(min-width:800px){body{font-size:calc(var(--fs) + 2px)}}
.app{max-width:1020px;margin:0 auto;padding:1rem}
h1{font-size:21px;font-weight:500;text-align:center;margin-bottom:1rem;color:var(--accent)}
h2{font-size:18px;font-weight:500;margin-bottom:.75rem}
h3{font-size:15px;font-weight:500;margin-bottom:.5rem}

.card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(201,137,159,.07)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:8px}

label{display:block;font-size:.95em;color:var(--ink-soft);margin-bottom:3px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:10px;font-size:.95em;background:#fff;color:var(--ink);outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(201,137,159,.14)}
textarea{resize:vertical;min-height:60px;line-height:1.7}

.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column}

button{padding:6px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);cursor:pointer;font-size:.95em;transition:all .12s;white-space:nowrap;font-family:inherit}
button:hover{background:var(--cream);border-color:var(--accent)}
button:active{transform:scale(.96)}
.bp{background:var(--accent);color:#fff;border-color:var(--accent)}
.bp:hover{background:#b87a90;border-color:#b87a90}
.bd{color:#b96e7c;border-color:#e8c3cc}
.bd:hover{background:#f9edf0}
.bs{padding:3px 8px;font-size:.88em}
.bg{border:none;background:none;color:var(--accent);padding:2px 6px}
.bg:hover{background:var(--accent-soft);border-radius:8px}
.btn-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

table{width:100%;border-collapse:collapse;font-size:.92em}
th{text-align:center;padding:6px 8px;background:var(--accent-soft);border-bottom:1px solid var(--line);font-weight:500;color:#a8798c;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid #f6ecf0;vertical-align:middle;text-align:center;white-space:nowrap}
tr:hover td{background:#fbf5f7}
td input,td select{padding:4px 6px;font-size:.95em;border-radius:6px}

.badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:.85em;font-weight:500;white-space:nowrap}
.b-blue{background:#e3f0fb;color:#5583c0}
.b-green{background:#e2f5e6;color:#4e9a63}
.b-amber{background:#fdf0dc;color:#c08a3e}
.b-red{background:#fde5ea;color:#d16277}
.b-purple{background:#ece7fa;color:#8a75c9}
.b-gray{background:#f4eef1;color:#a58a95}
.b-teal{background:#dff4ef;color:#3e9e88}
.b-coral{background:#fdeae2;color:#d07a55}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1rem}
.stat{background:var(--cream);border-radius:14px;padding:10px 14px;border:1px solid var(--line)}
.stat-l{font-size:12px;color:var(--ink-soft)}
.stat-v{font-size:22px;font-weight:500;color:var(--accent)}

.empty{text-align:center;color:var(--ink-soft);padding:1.5rem;font-size:13px}
.muted{color:var(--ink-soft);font-size:.9em}

.nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.nav-crumb{font-size:13px;color:var(--ink-soft);cursor:pointer}
.nav-crumb:hover{color:var(--accent)}
.nav-title{font-size:16px;font-weight:500}

.group-card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:1rem 1.25rem;margin-bottom:10px;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(201,137,159,.07)}
.group-card:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(201,137,159,.15);transform:translateY(-1px)}
.group-card .top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.group-card .name{font-size:15px;font-weight:500}
.group-card .meta{display:flex;gap:12px;margin-top:6px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap}

.tabs{display:flex;gap:2px;margin-bottom:1rem;border-bottom:2px solid var(--accent-soft);flex-wrap:wrap}
.tab{padding:6px 14px;cursor:pointer;border:none;background:none;font-size:.95em;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-2px;border-radius:10px 10px 0 0}
.tab:hover{color:var(--ink);background:var(--cream)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}

.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(92,74,82,.35);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:18px;padding:1.5rem;max-width:560px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:0 10px 40px rgba(201,137,159,.18)}

.cb{display:flex;align-items:center;gap:6px;margin:6px 0}
.cb input[type=checkbox]{width:auto}
.cb label{margin:0;font-size:13px;color:var(--ink)}

.search-bar{margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-bar select{width:auto;min-width:100px;flex:1}

.export-box{font-family:Consolas,monospace;font-size:11px;white-space:pre;background:var(--cream);padding:.75rem;border-radius:10px;overflow:auto;max-height:300px;margin-top:8px}

.toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}

.filter-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.chip{padding:3px 12px;border-radius:14px;font-size:.9em;cursor:pointer;border:1px solid var(--line);background:#fff}
.chip:hover{background:var(--cream);border-color:var(--accent)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.gear-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;font-size:18px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;border-radius:10px;padding:0}
.gear-btn:hover{background:var(--accent-soft);color:var(--ink)}

.settings-section{margin-bottom:20px}
.settings-section h3{border-bottom:1px solid var(--accent-soft);padding-bottom:6px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #fdf1f6;gap:10px;flex-wrap:wrap}
.setting-label{font-size:13px;color:var(--ink);flex:1;min-width:100px}
.setting-sub{font-size:11px;color:var(--ink-soft)}
.setting-control{min-width:120px}
.setting-control input,.setting-control select{width:100%;font-size:13px}
.setting-control input[type=checkbox]{width:auto}
.color-row{display:flex;gap:6px;align-items:center}
.color-row input[type=color]{width:36px;height:28px;padding:0;border:1px solid var(--line);border-radius:6px;cursor:pointer}

.bp-detail{display:flex;gap:12px;align-items:flex-start;margin-top:8px}
.bp-detail-img{width:140px;max-width:30%;border-radius:12px;border:1px solid var(--line);flex-shrink:0;cursor:zoom-in}
@media(max-width:640px){
  .bp-detail{flex-direction:column;align-items:center}
  .bp-detail-img{width:180px;max-width:70%}
  .bp-detail>div{width:100%}
}

td .slot-del{display:none;color:#d16277;cursor:pointer;margin-left:4px;font-weight:bold}
td:hover .slot-del{display:inline}
.slot-empty{cursor:pointer}
.slot-empty:hover{background:#f6dfe9!important}

.progress-bar{height:8px;background:var(--cream);border-radius:4px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}

.box-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin:8px 0}
.box-cell{text-align:center;padding:6px 4px;border-radius:10px;font-size:12px;border:1px solid var(--line)}
.box-cell.full{background:#e2f5e6;border-color:#a5d9b2;color:#4e9a63}
.box-cell.empty{background:#fde5ea;border-color:#f3b8c4;color:#d16277}
.box-cell.partial{background:#fdf0dc;border-color:#f2d5a4;color:#c08a3e}

.box-product{border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px}
.box-product-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}

.box-instance{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;background:#fef7fa}
.box-instance-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}

.price-grid{display:grid;grid-template-columns:1fr 100px;gap:4px 10px;align-items:center;margin:8px 0;font-size:13px}
.price-grid label{margin:0;font-size:13px}
.price-grid input{width:100px}
.price-summary{font-size:12px;padding:8px 10px;background:#fdf1f6;border-radius:6px;margin-top:8px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script src="data.js"></script>
<script>
const $=s=>document.querySelector(s);
// 唯讀模式：data.js 存在時（發布給團員的版本）以嵌入資料執行，所有編輯功能停用
const RO=!!window.VIEWER_DB;

// ── Settings ──
const DEFAULT_SETTINGS={
  // 外觀
  accentColor:'#c9899f',
  fontSize:13,
  appTitle:'阿伯一次買購',
  // 欄位名稱
  fieldNick:'暱稱',
  fieldItem:'商品',
  fieldQty:'數量',
  fieldPrice:'單價',
  fieldSeries:'系列',
  fieldNote:'備註',
  // 欄位顯示
  showSeries:false,
  showNote:true,
  showPrice:true,
  // 預設值
  defaultType:'basic',
  defaultStatus:'進行中',
  // 狀態選項（可自訂）
  statuses:'進行中,已截團待收款,收款中,已完成收款,已到貨,已結團',
  // 性質自訂
  typeCarryLabel:'帶多統計',
  typeCarryDesc:'社團售物，帶越多越優先',
  typeBoxLabel:'拆盒',
  typeBoxDesc:'拆盒分款，湊滿一盒的內容物才成團',
  typeBasicLabel:'一般代購',
  typeBasicDesc:'單純統計訂單數量金額',
};
function loadSettings(){
  if(RO)return{...DEFAULT_SETTINGS,...(window.VIEWER_SETTINGS||{})};
  const s=JSON.parse(localStorage.getItem('gp_settings')||'{}');
  // 一次性遷移：舊預設主題色改為低飽和馬卡龍粉
  if((s.accentColor==='#185fa5'||s.accentColor==='#e07a9e')&&!localStorage.getItem('gp_accent_mig2')){
    s.accentColor='#c9899f';
    localStorage.setItem('gp_settings',JSON.stringify(s));
    localStorage.setItem('gp_accent_mig2','1');
  }
  // 一次性遷移：舊標題改為新名稱
  if(s.appTitle==='社團周邊代購管理'&&!localStorage.getItem('gp_title_mig')){
    s.appTitle='阿伯一次買購';
    localStorage.setItem('gp_settings',JSON.stringify(s));
    localStorage.setItem('gp_title_mig','1');
  }
  // 一次性遷移 v2：狀態選項改為 進行中/收款中/已到貨/已結團
  if(!localStorage.getItem('gp_status_mig2')){
    if(s.statuses){
      const drop=['開團中','已截單','已封存'];
      const list=s.statuses.split(',').map(x=>x.trim()).filter(x=>x&&!drop.includes(x));
      for(const add of['進行中','收款中','已到貨','已結團'])if(!list.includes(add))list.push(add);
      s.statuses=list.join(',');
    }
    if(s.defaultStatus==='開團中')s.defaultStatus='進行中';
    localStorage.setItem('gp_settings',JSON.stringify(s));
    localStorage.setItem('gp_status_mig2','1');
  }
  // 一次性遷移 v3：補上「已完成收款」狀態（排在收款中之後）
  if(!localStorage.getItem('gp_status_mig3')){
    if(s.statuses){
      const list=s.statuses.split(',').map(x=>x.trim()).filter(Boolean);
      if(!list.includes('已完成收款')){
        const i=list.indexOf('收款中');
        list.splice(i>=0?i+1:list.length,0,'已完成收款');
        s.statuses=list.join(',');
        localStorage.setItem('gp_settings',JSON.stringify(s));
      }
    }
    localStorage.setItem('gp_status_mig3','1');
  }
  // 一次性遷移 v4：補上「已截團待收款」狀態（排在進行中之後）
  if(!localStorage.getItem('gp_status_mig4')){
    if(s.statuses){
      const list=s.statuses.split(',').map(x=>x.trim()).filter(Boolean);
      if(!list.includes('已截團待收款')){
        const i=list.indexOf('進行中');
        list.splice(i>=0?i+1:list.length,0,'已截團待收款');
        s.statuses=list.join(',');
        localStorage.setItem('gp_settings',JSON.stringify(s));
      }
    }
    localStorage.setItem('gp_status_mig4','1');
  }
  return {...DEFAULT_SETTINGS,...s};
}
function saveSetting(key,val){
  const s=loadSettings();s[key]=val;
  localStorage.setItem('gp_settings',JSON.stringify(s));
}
function saveAllSettings(obj){
  const s=loadSettings();Object.assign(s,obj);
  localStorage.setItem('gp_settings',JSON.stringify(s));
}
function resetSettings(){
  localStorage.removeItem('gp_settings');
}
function S(){return loadSettings();}

function getTypes(){
  const s=S();
  return {
    carry:{label:s.typeCarryLabel,badge:'b-purple',desc:s.typeCarryDesc},
    box:{label:s.typeBoxLabel,badge:'b-coral',desc:s.typeBoxDesc},
    basic:{label:s.typeBasicLabel,badge:'b-blue',desc:s.typeBasicDesc},
  };
}
function getStatuses(){return S().statuses.split(',').map(s=>s.trim()).filter(Boolean);}
function getSB(){
  const colors=['b-green','b-amber','b-blue','b-purple','b-gray','b-teal','b-coral','b-red'];
  const st=getStatuses();const m={};
  st.forEach((s,i)=>{m[s]=colors[i%colors.length];});
  return m;
}
function applyTheme(){
  const s=S();
  document.title=s.appTitle;
  document.documentElement.style.setProperty('--accent',s.accentColor);
  document.documentElement.style.setProperty('--fs',s.fontSize+'px');
  document.querySelectorAll('.bp').forEach(el=>{el.style.background=s.accentColor;el.style.borderColor=s.accentColor;});
  document.querySelectorAll('.tab.active').forEach(el=>{el.style.color=s.accentColor;el.style.borderBottomColor=s.accentColor;});
}

let _vdb=null;
function loadDB(){
  if(RO){if(!_vdb)_vdb=window.VIEWER_DB;return _vdb;}
  const db=JSON.parse(localStorage.getItem('gp_db2')||'{"groups":[],"nid":1}');
  // 舊喊單補上商品ID（款式名可跨商品重複，需要精準對應）
  let changed=false;
  // 舊狀態對應到新狀態
  const statusMap={'開團中':'進行中','已截單':'收款中','已封存':'已結團'};
  for(const g of db.groups){
    if(statusMap[g.status]){g.status=statusMap[g.status];changed=true;}
    // 過了截團時間的進行中團，自動轉為「已截團待收款」
    if(g.deadline&&g.status==='進行中'&&new Date(g.deadline)<new Date()){g.status='已截團待收款';changed=true;}
  }
  // 喊單人資料（跨團共用）：{暱稱:{contact:'',url:'',shots:[dataURL,...]}}
  if(!db.buyers)db.buyers={};
  // 舊資料的 contact 若是網址，搬到 url 欄位
  for(const n of Object.keys(db.buyers)){
    const b=db.buyers[n];
    if(b&&b.contact&&/^https?:\/\//.test(b.contact)&&!b.url){b.url=b.contact;b.contact='';changed=true;}
  }
  // 固團成員改為跨團共用：合併舊的團內名單
  if(!db.fixedTeam)db.fixedTeam={};
  if(!db.teamNotes)db.teamNotes={};
  for(const g of db.groups){
    if(g.fixedTeam){
      for(const[nick,slots]of Object.entries(g.fixedTeam)){
        if(!db.fixedTeam[nick])db.fixedTeam[nick]=slots;
      }
      delete g.fixedTeam;changed=true;
    }
  }
  for(const g of db.groups){
    if(g.type==='box'&&(g.boxProducts||[]).length){
      for(const o of g.orders){
        if(o.bpId==null){
          const bp=g.boxProducts.find(p=>p.contents.includes(o.item));
          if(bp){o.bpId=bp.id;changed=true;}
        }
      }
    }
  }
  if(changed)localStorage.setItem('gp_db2',JSON.stringify(db));
  return db;
}
function saveDB(db){if(RO)return;localStorage.setItem('gp_db2',JSON.stringify(db));}
function getG(id){return loadDB().groups.find(g=>g.id===id);}
function upG(id,fn){const db=loadDB();const g=db.groups.find(g=>g.id===id);if(g){fn(g);saveDB(db);}}

let view='home',gid=null,tab='orders',sNick='',sItem='',homeFilter='';
function goHome(){view='home';gid=null;render();}
function goGroup(id){view='group';gid=id;tab='orders';sNick='';sItem='';render();}
function render(){view==='home'?renderHome():renderGroup();}

// ── Home ──
function renderHome(){
  const db=loadDB();
  // 唯讀模式以「狀態」篩選；管理模式以「性質」篩選
  const groups=homeFilter?db.groups.filter(g=>RO?g.status===homeFilter:g.type===homeFilter):db.groups;
  const active=groups.filter(g=>g.status!=='已封存');
  const archived=groups.filter(g=>g.status==='已封存');

  const TYPES=getTypes();const st=S();
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${RO?'.3rem':'1rem'}">
    <h1 style="margin:0">${esc(st.appTitle)}</h1>
    <button class="gear-btn" onclick="showSettings()" title="設定">⚙</button></div>
    ${RO&&window.VIEWER_DB.publishedAt?`<div class="muted" style="margin-bottom:1rem">資料更新時間：${esc(window.VIEWER_DB.publishedAt)}</div>`:''}
    <div class="toolbar"><button class="bp" onclick="showNewGroupModal()">建立新團</button><button onclick="showFixedTeamModal()">固團成員</button><button onclick="showShipModal()">個人貨況查詢</button><button onclick="exportViewerData()">發布查詢資料</button><span class="muted">共 ${db.groups.length} 個團</span></div>
    <div class="filter-chips"><span class="chip ${homeFilter===''?'active':''}" onclick="homeFilter='';render()">全部</span>
    ${RO
      ?['進行中','已截團待收款','收款中','已完成收款','已到貨'].map(s=>`<span class="chip ${homeFilter===s?'active':''}" onclick="homeFilter='${s}';render()">${s}</span>`).join('')
      :Object.entries(TYPES).map(([k,v])=>`<span class="chip ${homeFilter===k?'active':''}" onclick="homeFilter='${k}';render()">${v.label}</span>`).join('')}</div>`;

  if(!active.length&&!archived.length) h+=`<div class="empty">還沒有團購，點「建立新團」開始</div>`;
  for(const g of active) h+=groupCard(g);
  if(archived.length){h+=`<h3 style="margin-top:1.5rem;color:#888780">已封存</h3>`;for(const g of archived) h+=groupCard(g,true);}
  $('#app').innerHTML=h;
}

function groupCard(g,dim){
  const buyers=new Set(g.orders.map(o=>o.nick)).size;
  const totalQty=g.orders.reduce((s,o)=>s+o.qty,0);
  const T=getTypes(),SB=getSB();
  const ti=T[g.type]||T.basic;
  let extra='';
  if(g.type==='box'){
    const bp=(g.boxProducts||[]);
    const boxInfo=bp.map(p=>calcBoxes(g,p));
    const totalComplete=boxInfo.reduce((s,b)=>s+b.complete,0);
    extra=`<span>${bp.length} 種商品</span><span>${totalComplete} 盒成團</span>`;
  }
  return `<div class="group-card" onclick="goGroup(${g.id})" style="${dim?'opacity:.6':''}">
    <div class="top"><div style="display:flex;align-items:center;gap:8px"><span class="name">${esc(g.name)}</span><span class="badge ${ti.badge}">${ti.label}</span></div>
    <span class="badge ${SB[g.status]||'b-gray'}">${g.status}</span></div>

    {key:'single',label:'單領',show:g.type==='box'},

function renderOrdersTab(g){
  const st=S();
  const _team=getTeam();
  const nicks=[...new Set(g.orders.map(o=>o.nick))].sort();
  const items=[...new Set(g.orders.map(o=>o.item))].sort();
  const isBox=g.type==='box';

  let h=RO?'':`<div class="card"><h3>新增喊單</h3>
    <p class="muted" style="margin-bottom:8px">批次：${st.fieldNick} / ${isBox?'款式':st.fieldItem} / ${st.fieldQty}${isBox?'':' / '+st.fieldPrice}（每行一筆）</p>
    <textarea id="bulkIn" placeholder="${isBox?'小明 / 角色A / 1\n小花 / 角色B / 2\n阿杰 / 角色A / 3':'小明 / 立牌A / 2 / 150\n小花 / 吊飾B / 3 / 80'}" rows="4"></textarea>
    <div class="btn-row"><button class="bp" onclick="bulkAdd(${g.id})">批次匯入</button>
    <button onclick="showSingleOrderModal(${g.id})">單筆新增</button></div></div>`;

  h+=`<div class="card"><div class="card-header"><h3 style="margin:0">喊單列表 (${g.orders.length})</h3>
    <button class="bs bd" onclick="clearOrders(${g.id})">清除全部</button></div>`;
  // 商品篩選：拆盒團依商品分組，可選整個商品或單一款式
  let itemFilterHtml;
  const bps=g.boxProducts||[];
  if(isBox&&bps.length){
    itemFilterHtml=`<select onchange="sItem=this.value;render()"><option value="">全部${esc(st.fieldItem)}</option>`+
      bps.map(p=>`<optgroup label="${esc(p.name)}">
        <option value="bp:${p.id}" ${sItem==='bp:'+p.id?'selected':''}>${esc(p.name)}（全部）</option>
        ${p.contents.map(c=>{const v=p.id+'|||'+c;return `<option value="${esc(v)}" ${sItem===v?'selected':''}>${esc(c)}</option>`;}).join('')}
      </optgroup>`).join('')+`</select>`;
  } else {
    itemFilterHtml=`<select onchange="sItem=this.value;render()"><option value="">全部${esc(st.fieldItem)}</option>${items.map(n=>`<option value="${esc(n)}" ${sItem===n?'selected':''}>${esc(n)}</option>`).join('')}</select>`;
  }
  h+=`<div class="search-bar">
    ${itemFilterHtml}
    <select onchange="sNick=this.value;render()"><option value="">全部${esc(st.fieldNick)}</option>${nicks.map(n=>`<option value="${esc(n)}" ${sNick===n?'selected':''}>${esc(n)}</option>`).join('')}</select></div>`;

  let filtered=g.orders;
  if(sNick) filtered=filtered.filter(o=>o.nick===sNick);
  if(sItem){
    if(sItem.startsWith('bp:')){
      const id=parseInt(sItem.slice(3));
      const p=bps.find(b=>b.id===id);
      filtered=p?filtered.filter(o=>orderMatches(p,o)&&p.contents.includes(o.item)):filtered;
    } else if(sItem.includes('|||')){
      const sep=sItem.indexOf('|||');
      const id=parseInt(sItem.slice(0,sep)),it=sItem.slice(sep+3);
      const p=bps.find(b=>b.id===id);
      filtered=filtered.filter(o=>o.item===it&&(p?orderMatches(p,o):true));
    } else {
      filtered=filtered.filter(o=>o.item===sItem);
    }
  }

  if(!filtered.length){h+=`<div class="empty">無喊單</div>`;}
  else{
    h+=`<div style="overflow-x:auto"><table><thead><tr>
      <th>${esc(st.fieldNick)}</th><th>${esc(st.fieldItem)}</th>${isBox?'<th>所屬盒組</th>':''}<th>${esc(st.fieldQty)}</th><th>${esc(st.fieldPrice)}</th><th>小計</th><th>${esc(st.fieldNote)}</th><th>時間</th>${RO?'':'<th>操作</th>'}
    </tr></thead><tbody>`;
    for(const o of filtered){
      let boxName='';
      if(isBox){const bp=(g.boxProducts||[]).find(p=>orderMatches(p,o)&&p.contents.includes(o.item));boxName=bp?bp.name:'';}
      const pr=effPrice(g,o);
      const isTeam=!!_team[o.nick];
      const fxBadge=(!isTeam&&o.fixed==='slot'?` <span class="badge b-purple">固${o.fixedRank||''}</span>`:!isTeam&&o.fixed==='pick'?' <span class="badge b-teal">撿</span>':'')+(o.lift?' <span class="badge b-amber">提</span>':'');
      h+=`<tr><td>${isTeam?`<span style="color:#a32d2d;font-weight:bold">${esc(o.nick)}</span>`:esc(o.nick)}${fxBadge}</td><td>${esc(o.item)}</td>
        ${isBox?`<td>${boxName?`<span class="badge b-coral">${esc(boxName)}</span>`:`<span class="muted">未對應</span>`}</td>`:''}
        <td>${o.qty}</td><td>${pr?'$'+pr:'-'}</td><td>${pr?'$'+(o.qty*pr):'-'}</td>
        <td class="muted">${esc(o.note||'')}</td>
        <td class="muted" style="white-space:nowrap">${fmtTs(o.ts)}</td>
        ${RO?'':`<td style="white-space:nowrap"><button class="bs bg" onclick="showEditOrderModal(${g.id},${o.id})">編輯</button>
        <button class="bs bg" style="color:#a32d2d" onclick="delOrder(${g.id},${o.id})">刪除</button></td>`}</tr>`;
    }
    h+=`</tbody></table></div>`;
  }
  h+=`</div>`;return h;
}

// ── 個人貨況查詢（到貨/出貨狀態存於各團 g.ship） ──
let _spNick='',_spGid='',_spHide=false;
function showShipModal(){
  const db=loadDB();
  const nicks=[...new Set(db.groups.flatMap(g=>g.orders.map(o=>o.nick)))].sort();
  let rowsHtml='';
  if(_spNick){
    const gs=_spGid?db.groups.filter(g=>g.id===parseInt(_spGid)):db.groups;
    for(const g of gs){
      const list=getConfirmedOrders(g).filter(o=>o.nick===_spNick);
      if(!list.length)continue;
      const ship=g.ship||{};
      let rows='';
      const groupArrived=['已到貨','已結團'].includes(g.status);
      for(const o of list){
        const fullKey=`${o.bpId||''}|||${o.item}|||${o.bind?1:0}|||${_spNick}`;
        const st=ship[fullKey]||{};
        if(_spHide&&st.s)continue;
        const bp=(g.boxProducts||[]).find(p=>orderMatches(p,o)&&p.contents.includes(o.item));
        const label=bpItemLabel(bp,o.item)+(o.bind?'（綁）':'');
        const arrived=effArrived(g,fullKey);
        const arrCell=groupArrived&&!RO
          ?`<span class="badge ${arrived?'b-green':'b-red'}" style="cursor:pointer" title="點擊標記缺件/到貨" onclick="toggleShip(${g.id},'${encodeURIComponent(fullKey)}','na')">${arrived?'已到貨':'缺件'}</span>`
          :`<span class="badge ${arrived?'b-green':(groupArrived&&st.na)?'b-red':'b-amber'}">${arrived?'已到貨':(groupArrived&&st.na)?'缺件':'未到貨'}</span>`;
        rows+=`<tr><td>${esc(label)}</td><td style="text-align:center">${o.qty}</td>
          <td>${arrCell}</td>
          <td><span class="badge ${st.s?'b-green':'b-gray'}" style="cursor:pointer" title="點擊切換" onclick="toggleShip(${g.id},'${encodeURIComponent(fullKey)}','s')">${st.s?'已出貨':'未出貨'}</span></td></tr>`;
      }
      if(rows)rowsHtml+=`<h3 style="margin:10px 0 4px">${esc(g.name)}</h3>
        <div style="overflow-x:auto"><table><thead><tr><th>商品</th><th>數量</th><th>到貨</th><th>出貨</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    if(!rowsHtml)rowsHtml='<div class="empty">無資料</div>';
  } else rowsHtml='<div class="empty">請選擇暱稱</div>';
  openModal(`<h3>個人貨況查詢</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center">
      <select onchange="_spNick=this.value;showShipModal()"><option value="">暱稱</option>${nicks.map(n=>`<option value="${esc(n)}" ${_spNick===n?'selected':''}>${esc(n)}</option>`).join('')}</select>
      <select onchange="_spGid=this.value;showShipModal()"><option value="">顯示全部</option>${db.groups.map(g=>`<option value="${g.id}" ${_spGid==g.id?'selected':''}>${esc(g.name)}</option>`).join('')}</select>
      <label style="display:inline-flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;white-space:nowrap">
        <input type="checkbox" ${_spHide?'checked':''} onchange="_spHide=this.checked;showShipModal()">隱藏已出貨</label>
    </div>
    <div style="max-height:60vh;overflow-y:auto">${rowsHtml}</div>
    <div class="btn-row" style="margin-top:10px"><button onclick="closeModal()">關閉</button></div>`);
}
// 到貨狀態：跟著團的狀態走（已到貨/已結團＝到貨），可對個別項目手動標記缺件（na）
function effArrived(g,key){
  if(!['已到貨','已結團'].includes(g.status))return false;
  return !(((g.ship||{})[key]||{}).na);
}
function toggleShip(gid,keyEnc,field){
  const key=decodeURIComponent(keyEnc);
  upG(gid,g=>{if(!g.ship)g.ship={};const st=g.ship[key]||{};st[field]=st[field]?0:1;g.ship[key]=st;});
  showShipModal();
}
// 喊單總覽的出貨/缺件勾選（與個人貨況查詢共用同一份狀態）
function toggleShipKey(gid,keyEnc,field){
  const key=decodeURIComponent(keyEnc);
  const f=field||'s';
  upG(gid,g=>{if(!g.ship)g.ship={};const st=g.ship[key]||{};st[f]=st[f]?0:1;g.ship[key]=st;});
  render();
}

function addTeamMember(){
  const nick=$('#ftNick').value.trim();

  if(document.querySelector(`.ft-member[data-nick="${CSS.escape(nick)}"],.ft-row[data-nick="${CSS.escape(nick)}"]`)){alert('成員已存在');return;}
  $('#ftList').insertAdjacentHTML('beforeend',ftMemberBlock(nick,{}));

}
function saveFixedTeam(){
  const team={};const notes={};
  document.querySelectorAll('#ftList .ft-row,#ftList .ft-member').forEach(el=>{
    const nick=el.dataset.nick;
    if(el.classList.contains('ft-row')){
      // 未展開編輯：沿用原資料
      team[nick]=_ftTeam[nick]||{};
      if(_ftNotes[nick])notes[nick]=_ftNotes[nick];
      return;
    }
    const slots={};
    el.querySelectorAll('.ftSlot').forEach(chip=>{
      const s=chip.dataset.style;
      const v=chip.querySelector('.ftSel')?.value;
      if(!s||!v)return;
      if(v==='pick')slots[s]={t:'pick'};
      else if(v.startsWith('slot:'))slots[s]={t:'slot',r:parseInt(v.slice(5))||1};
    });
    team[nick]=slots;
    const note=el.querySelector('.ftNote')?.value.trim();
    if(note)notes[nick]=note;
  });
  const db=loadDB();db.fixedTeam=team;db.teamNotes=notes;saveDB(db);
  closeModal();render();
}

function bpDetailHtml(g,p){
  let h='';
  const isSingle=p.kind==='single';
  if(p.img)h+=`<div class="bp-detail"><img class="bp-detail-img" src="${p.img}" onclick="event.stopPropagation();showImg(this.src)"><div style="flex:1;min-width:0;overflow-x:auto">`;
  h+=`<div style="font-size:12px;margin:8px 0 6px">款式：${p.contents.map(c=>{
    const pr=isSingle?(p.unitPrice||null):(p.adjustPrice&&p.itemPrices&&p.itemPrices[c]!=null?p.itemPrices[c]:(p.avgPrice||null));
    return `<span style="display:inline-block;padding:1px 6px;margin:2px;background:#fdf1f6;border-radius:4px">${esc(c)}${pr!=null?' $'+pr:''}</span>`;
  }).join('')}</div>`;

  if(isSingle){
    h+=`<div style="overflow-x:auto"><table><thead><tr><th>款式</th><th>單價</th><th>已喊</th><th>喊單者</th></tr></thead><tbody>`;
    for(const c of p.contents){
      const buyers=g.orders.filter(o=>o.item===c&&orderMatches(p,o));
      const qty=buyers.reduce((s,o)=>s+o.qty,0);
      h+=`<tr><td>${esc(c)}</td><td>${p.unitPrice?'$'+p.unitPrice:'-'}</td><td>${qty}</td>
        <td class="muted">${buyers.map(b=>`${esc(b.nick)}×${b.qty}`).join(', ')||'-'}</td></tr>`;
    }
    h+=`</tbody></table></div>`;
    if(p.img)h+='</div></div>';
    return h;
  }

  const info=calcBoxes(g,p);
  h+=`${p.adjustPrice?`<div style="font-size:12px;margin-bottom:6px;color:#534ab7">已調價 · 均價 $${p.avgPrice||0} · 各款合計 $${p.contents.reduce((s,c)=>(p.itemPrices?s+(p.itemPrices[c]||0):s),0)}</div>`:''}
    <div style="display:flex;gap:16px;font-size:13px;margin-bottom:10px;flex-wrap:wrap">
      <span>已成 <strong>${info.complete}</strong> 配</span>
      ${info.bindComplete?`<span style="color:#534ab7">含綁成團 <strong>${info.bindComplete}</strong> 配</span>`:''}
      <span>開 <strong>${info.boxesNeeded}</strong> 盒</span>
      <span>餘量 <strong style="color:${info.surplus?'#a32d2d':'#3b6d11'}">${info.surplus}</strong> 個</span>
      <span class="muted">上限 ${p.maxBoxes||'不限'} 盒${p.pricePerBox?' · $'+p.pricePerBox+'/盒':''}</span>
    </div>`;

  const hasAdj=p.adjustPrice&&p.itemPrices;
  h+=`<div style="overflow-x:auto"><table><thead><tr><th>款式</th><th>單價${hasAdj?'（調價後）':''}</th><th>需求</th><th>供給 (${info.boxesNeeded}盒)</th><th>狀態</th><th>喊單者</th></tr></thead><tbody>`;
  for(const c of p.contents){
    const demand=info.demands[c]||0;
    const supply=info.boxesNeeded;
    const surplus=supply-demand;
    const buyers=info.buyerMap[c]||[];
    const itemPrice=hasAdj&&p.itemPrices[c]!=null?p.itemPrices[c]:(p.avgPrice||null);
    let st='';
    if(demand===0) st='<span class="badge b-red">無人喊</span>';
    else if(surplus>0) st=`<span class="badge b-amber">餘 ${surplus}</span>`;
    else st='<span class="badge b-green">已無</span>';
    h+=`<tr><td>${esc(c)}</td><td>${itemPrice!=null?'$'+itemPrice:'-'}</td><td>${demand}</td><td>${supply}</td><td>${st}</td>
      <td class="muted">${buyers.map(b=>`${esc(b.nick)}${b.bind?'(綁)':''}×${b.qty}`).join(', ')||'-'}</td></tr>`;
  }
  h+=`</tbody></table></div>`;

  if(info.boxesNeeded>0){
    const bind=p.bindItems||{};
    // 有上限盒數：顯示全部；無上限：只顯示到已填滿之後的 10 配
    let showN=info.boxesNeeded;
    if(!p.maxBoxes){
      const filled=info.boxes.filter(b=>b.every(s=>s.buyer)).length;
      showN=Math.min(info.boxesNeeded,filled+10);
    }
    h+=`<div style="overflow-x:auto;margin-top:12px"><table><thead><tr><th></th>
      ${p.contents.map(c=>`<th>${esc(c)}${bind[c]?` <span class="badge b-purple" style="font-size:9px">綁${bind[c]}</span>`:''}</th>`).join('')}<th>狀態</th><th></th></tr></thead><tbody>`;
    for(let i=0;i<showN;i++){
      const box=info.boxes[i];
      h+=`<tr><td style="white-space:nowrap;font-weight:bold">第 ${i+1} 配</td>`;
      const hasEmpty=box.some(s=>!s.buyer);
      const hasBinder=box.some(s=>s.buyer&&!s.buyer.bind&&bind[s.item]);
      for(const slot of box){
        if(slot.buyer){
          const needBind=hasEmpty&&bind[slot.item]&&!slot.buyer.bind;
          h+=`<td${needBind?' style="color:#a32d2d;font-weight:bold"':''}>${esc(slot.buyer.nick)}${slot.buyer.bind?'(綁)':''}${slot.buyer.manual?'*':''}<span class="slot-del" title="移除此格喊單" onclick="event.stopPropagation();removeSlotUnit(${g.id},${p.id},${i},'${encodeURIComponent(slot.item)}','${encodeURIComponent(slot.buyer.nick)}',${slot.buyer.bind?1:0})">✕</span></td>`;
        }
        else h+=`<td class="slot-empty" style="background:#fdf1f6" title="點擊追加喊單" onclick="fillSlot(${g.id},${p.id},${i},'${encodeURIComponent(slot.item)}')"></td>`;
      }
      const sb=box.status==='成團'?'b-green':box.status==='含綁成團'?'b-purple':'b-amber';
      h+=`<td><span class="badge ${sb}">${box.status}</span></td>`;
      h+=`<td>${hasEmpty&&hasBinder?`<button class="bs bp" onclick="event.stopPropagation();showBindModal(${g.id},${p.id},${i})">綁</button>`:''}</td></tr>`;
    }
    if(showN<info.boxesNeeded)h+=`<tr><td colspan="${p.contents.length+3}" class="muted" style="text-align:center">…其餘 ${info.boxesNeeded-showN} 配未顯示</td></tr>`;
    h+=`</tbody></table></div>`;
  }
  if(p.img)h+='</div></div>';
  return h;
}

// 帶餘提配資格：該暱稱在「尚未成團的配」裡要有喊單（已成團的不算）
function hasUnconfirmedOrders(g,p,nick){
  const info=calcBoxes(g,p);
  for(const box of info.boxes){
    if(box.every(s=>s.buyer))continue;
    if(box.some(s=>s.buyer&&!s.buyer.bind&&s.buyer.nick===nick))return true;
  }
  return false;
}

// 手動編輯排單表格：移除某格的喊單（數量-1）
function removeSlotUnit(gid,pid,boxIdx,itemEnc,nickEnc,isBind){
  const item=decodeURIComponent(itemEnc),nick=decodeURIComponent(nickEnc);
  if(!confirm(`移除 ${nick} 的「${item}」1 個？`))return;
  upG(gid,g=>{
    const p=(g.boxProducts||[]).find(b=>b.id===pid);
    const o=g.orders.find(o=>o.nick===nick&&o.item===item&&(!!o.bind)===(!!isBind)&&(p?orderMatches(p,o):true));
    if(o){o.qty-=1;if(o.qty<=0)g.orders=g.orders.filter(x=>x!==o);}
    if(p&&p.pins){const key=boxIdx+'|||'+item;if(p.pins[key]===nick)delete p.pins[key];}
  });
  render();
}

function doFillSlot(gid,pid,boxIdx,itemEnc){
  const item=decodeURIComponent(itemEnc);
  const n=$('#fsNick').value.trim();
  if(!n){alert('請輸入暱稱');return;}

  }
  upG(gid,g2=>{

    const ex=g2.orders.find(o=>!o.bind&&o.nick===n&&o.item===item&&orderMatches(p2,o)&&(!!o.lift)===isLift);
    if(ex)ex.qty+=1;
    else g2.orders.push({id:g2.nOid++,nick:n,item,series:'',qty:1,price:lookupPrice(g2,item,pid)||0,note:'',bpId:pid,lift:isLift,ts:Date.now()});
    if(!p2.pins)p2.pins={};
    p2.pins[boxIdx+'|||'+item]=n;
  });
  closeModal();render();
}

function applyBind(gid,pid){
  const picks=[...document.querySelectorAll('.bindSel')].map(s=>({item:s.dataset.item,nick:s.value})).filter(x=>x.nick);
  if(!picks.length){closeModal();return;}
  upG(gid,g=>{
    for(const x of picks){
      const price=lookupPrice(g,x.item,pid)||0;
      g.orders.push({id:g.nOid++,nick:x.nick,item:x.item,series:'',qty:1,price,note:'綁',bpId:pid,bind:true,ts:Date.now()});
    }
  });
  closeModal();render();
}

function calcBoxes(g,p){
  const demands={};
  const buyerMap={};
  for(const c of p.contents){demands[c]=0;buyerMap[c]=[];}
  // 帶餘提配（僅在本商品內生效）：帶走餘量者，其既有喊單可提前，每款最多提前「帶餘數量」個
  const liftQty={};const liftAdd={};
  for(const o of g.orders){
    if(o.lift&&!o.bind&&p.contents.includes(o.item)&&orderMatches(p,o)){
      liftQty[o.nick]=(liftQty[o.nick]||0)+o.qty;
      liftAdd[o.item]=(liftAdd[o.item]||0)+o.qty;
    }
  }
  let seq=0;const distinct={};
  for(const o of g.orders){
    if(p.contents.includes(o.item)&&orderMatches(p,o)){
      demands[o.item]=(demands[o.item]||0)+o.qty;
      buyerMap[o.item]=buyerMap[o.item]||[];
      buyerMap[o.item].push({nick:o.nick,qty:o.qty,bind:!!o.bind,fixed:o.fixed||null,fixedRank:o.fixedRank||0,fixedItems:o.fixedItems||null,isLift:!!o.lift,oid:o.id||0,seq});
      if(!o.bind)(distinct[o.nick]=distinct[o.nick]||new Set()).add(o.item);
    }
    seq++;
  }
  const maxDemand=Math.max(0,...Object.values(demands));
  const minDemand=p.contents.length?Math.min(...p.contents.map(c=>demands[c]||0)):0;
  let boxesNeeded=maxDemand;
  if(p.maxBoxes && boxesNeeded>p.maxBoxes) boxesNeeded=p.maxBoxes;
  const bind=p.bindItems||{};
  let surplus=0;
  for(const c of p.contents) surplus+=Math.max(0,boxesNeeded-(demands[c]||0));

  // 排序（依款式各自計算）：
  // 固位優先期間：該款固位（依固位數）→ 該款撿漏 → 固團但該款無位 → 一般（依商品排序規則）→ 綁單
  // 結束固位優先後：切點之後的喊單，固位效力退化為撿漏；切點前的喊單不受影響
  // 成員位子優先讀固團名單（g.fixedTeam），無名單記錄才用喊單上的舊設定
  const rule=p.sortRule||'fifo';
  const team=getTeam();
  const slotActive=e=>!g.fixEnded||(g.fixEndAt!=null&&e.oid<g.fixEndAt);
  const boxes=[];
  const remaining={};
  for(const c of p.contents){
    for(const e of (buyerMap[c]||[])){
      let type=null,rank=0;
      const m=team[e.nick];
      const pos=m?m[c]:null;
      if(pos){type=pos.t;rank=pos.r||0;}
      else if(e.fixed){
        const applies=e.fixedItems&&e.fixedItems.length?e.fixedItems.includes(c):true;
        if(applies){type=e.fixed==='slot'?'slot':'pick';rank=e.fixedRank||0;}
        else type='member';
      }
      else if(m)type='member'; // 名單成員但該款無位
      if(e.bind)e._cls=5;
      else if(type==='slot')e._cls=slotActive(e)?0:1;
      else if(type==='pick')e._cls=1;
      else if(type==='member')e._cls=2;
      else e._cls=3;
      e._rank=rank;
    }
    const sortFn=(a,b)=>{
      if(a._cls!==b._cls)return a._cls-b._cls;
      if(a._cls===0&&(a._rank||999)!==(b._rank||999))return(a._rank||999)-(b._rank||999);
      if(a._cls===3){
        if(rule==='single'&&b.qty!==a.qty)return b.qty-a.qty;
        if(rule==='easy'){const da=distinct[a.nick]?.size||0,db=distinct[b.nick]?.size||0;if(db!==da)return db-da;}
      }
      return a.seq-b.seq;
    };
    remaining[c]=[];
    for(const b of [...(buyerMap[c]||[])].sort(sortFn)){
      for(let i=0;i<b.qty;i++) remaining[c].push({nick:b.nick,bind:b.bind,fixed:b.fixed,isLift:b.isLift});
    }
  }
  // 帶餘提配：鎖定「不含帶餘」時已填滿的配；未成的配中，
  // 每位提配者的餘量與被提的喊單以「區塊」對齊，保證落在同一配
  const minNoLift=p.contents.length?Math.min(...p.contents.map(c=>(demands[c]||0)-(liftAdd[c]||0))):0;
  const lockN=Math.min(Math.max(0,minNoLift),boxesNeeded);
  const liftersOrder=[];const _seenL={};
  for(const o of g.orders){
    if(o.lift&&!o.bind&&p.contents.includes(o.item)&&orderMatches(p,o)&&!_seenL[o.nick]){_seenL[o.nick]=1;liftersOrder.push(o.nick);}
  }
  if(liftersOrder.length){
    // 帶餘單位一律先抽出，鎖定區只由一般喊單組成（已成的配完全不受帶餘影響）
    const styleData={};
    for(const c of p.contents){
      const q=remaining[c];
      const liftUnits=q.filter(u=>u.isLift);
      const nonLift=q.filter(u=>!u.isLift);
      const locked=nonLift.slice(0,lockN);
      const rest=nonLift.slice(lockN);
      const byNick={};const promoUsed={};const normal=[];
      // 帶餘單位進提配者區塊
      for(const u of liftUnits){(byNick[u.nick]=byNick[u.nick]||[]).push(u);}
      // 既有喊單提前：每款上限＝帶餘數量，僅算未成區
      for(const u of rest){
        if(!u.bind&&liftQty[u.nick]>0&&(promoUsed[u.nick]||0)<liftQty[u.nick]){
          promoUsed[u.nick]=(promoUsed[u.nick]||0)+1;u.lifted=true;
          (byNick[u.nick]=byNick[u.nick]||[]).push(u);continue;
        }
        normal.push(u);
      }
      styleData[c]={locked,byNick,normal};
    }
    // 區塊大小＝該提配者各款單位數的最大值，依提配登記順序排區塊
    const blocks={};let offsetTotal=0;
    for(const nick of liftersOrder){
      const size=Math.max(0,...p.contents.map(c=>(styleData[c].byNick[nick]||[]).length));
      blocks[nick]=offsetTotal;offsetTotal+=size;
    }
    for(const c of p.contents){
      const{locked,byNick,normal}=styleData[c];
      const arr=new Array(offsetTotal).fill(null);
      for(const nick of liftersOrder){
        (byNick[nick]||[]).forEach((u,i)=>{arr[blocks[nick]+i]=u;});
      }
      // 一般單位先補洞，再往後排
      const out=[];let ni=0;
      for(let i=0;i<arr.length;i++){out.push(arr[i]!==null?arr[i]:(ni<normal.length?normal[ni++]:null));}
      while(ni<normal.length)out.push(normal[ni++]);
      remaining[c]=locked.concat(out);
    }
  }
  // 手動釘選：指定格子優先於所有規則，從佇列中預留該暱稱的單位
  const pins=p.pins||{};
  const reserved={};
  for(const[key,nick]of Object.entries(pins)){
    const sep=key.indexOf('|||');
    const bi=parseInt(key.slice(0,sep)),item=key.slice(sep+3);
    if(isNaN(bi)||bi>=boxesNeeded||!remaining[item])continue;
    let idx=remaining[item].findIndex(u=>u.nick===nick&&!u.bind);
    if(idx<0)idx=remaining[item].findIndex(u=>u.nick===nick);
    if(idx>=0){const u=remaining[item].splice(idx,1)[0];u.manual=true;reserved[key]=u;}
  }
  let complete=0,bindComplete=0;
  for(let i=0;i<boxesNeeded;i++){
    const box=p.contents.map(c=>{
      const key=i+'|||'+c;
      const buyer=reserved[key]||remaining[c].shift()||null;
      return {item:c,buyer};
    });
    const emptySlots=box.filter(s=>!s.buyer);
    if(!emptySlots.length){
      // 全滿：若有綁單填入則為含綁成團
      if(box.some(s=>s.buyer&&s.buyer.bind)){box.status='含綁成團';bindComplete++;}
      else{box.status='成團';complete++;}
    } else {
      // 需綁款的買家（非綁單）提供綁量，足以補滿空位則含綁成團
      let bindCap=0;
      for(const s of box){
        if(s.buyer&&!s.buyer.bind&&bind[s.item])bindCap+=bind[s.item];
      }
      if(bindCap>=emptySlots.length&&bindCap>0){box.status='含綁成團';bindComplete++;}
      else box.status='未成團';
    }
    boxes.push(box);
  }

  return {demands,buyerMap,maxDemand,minDemand,boxesNeeded,complete,bindComplete,surplus,boxes};
}

function payTotal(g,nick,computed){
  const p=(g.pay||{})[nick];
  return p&&p.totalOv!=null?p.totalOv:computed;
}
function renderPayTab(g){
  const totals={};
  for(const o of getConfirmedOrders(g)){totals[o.nick]=(totals[o.nick]||0)+o.qty*effPrice(g,o);}
  const pay=g.pay||{};
  const team=getTeam();
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  let h=`<div class="card"><h3>收款狀況</h3>`;
  if(!sorted.length){h+=`<div class="empty">無資料</div>`;}

    for(const[nick,computed]of sorted){
      const p=pay[nick]||{paid:0,note:''};
      const total=payTotal(g,nick,computed);

      let st;
      if(!p.paid) st='<span class="badge b-amber">未收款</span>';

      else st='<span class="badge b-green">已付清</span>';
      h+=`<tr><td>${team[nick]?`<span style="color:#a32d2d;font-weight:bold">${esc(nick)}</span>`:esc(nick)}</td>
        <td>$${total.toLocaleString()}${isOv?'<span style="color:#d16277;font-weight:bold">*</span>':''}</td><td>${p.paid?'$'+p.paid.toLocaleString():'-'}</td><td>${st}</td>
        <td class="muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.note||'')}</td>
        <td><button class="bs bg" onclick="showPayModal(${g.id},'${encodeURIComponent(nick)}')">編輯</button></td></tr>`;
    }
    h+=`</tbody></table></div>`;
  }
  h+=`</div>`;return h;
}
function showPayModal(gid,nickEnc){
  const nick=decodeURIComponent(nickEnc);
  const g=getG(gid);if(!g)return;
  const computed=getConfirmedOrders(g).filter(o=>o.nick===nick).reduce((s,o)=>s+o.qty*effPrice(g,o),0);
  const p=(g.pay||{})[nick]||{paid:0,note:''};
  const total=payTotal(g,nick,computed);
  openModal(`<h3>${esc(nick)} 收款</h3>
    <p class="muted" style="margin-bottom:8px">系統計算應付 $${computed.toLocaleString()}${p.totalOv!=null?`　（目前手動改為 $${p.totalOv.toLocaleString()}）`:''}</p>
    <div class="form-row">
      <div class="form-group"><label>應付總額（改動後會標 *）</label><input id="payTotal" type="number" min="0" value="${total}"></div>
      <div class="form-group"><label>已收款項</label><input id="payAmt" type="number" min="0" value="${p.paid||''}"></div>
    </div>
    <div class="form-group" style="margin-bottom:10px"><label>備註</label><input id="payNote" value="${esc(p.note||'')}"></div>
    <div class="btn-row">
      <button class="bs" onclick="document.getElementById('payAmt').value=document.getElementById('payTotal').value">填入全額</button>
      <button class="bs" onclick="document.getElementById('payTotal').value=${computed}">還原系統計算</button>
      <button class="bp" onclick="savePay(${gid},'${encodeURIComponent(nick)}',${computed})">儲存</button>
      <button onclick="closeModal()">取消</button></div>`);
  setTimeout(()=>$('#payAmt').focus(),100);
}
function savePay(gid,nickEnc,computed){
  const nick=decodeURIComponent(nickEnc);
  const paid=parseFloat($('#payAmt').value)||0;
  const note=$('#payNote').value.trim();
  const totalIn=parseFloat($('#payTotal').value);
  upG(gid,g=>{
    if(!g.pay)g.pay={};
    const rec={paid,note};
    // 與系統計算不同才記錄覆寫
    if(!isNaN(totalIn)&&totalIn!==computed)rec.totalOv=totalIn;
    g.pay[nick]=rec;
  });
  closeModal();render();
}

// 總表：列=買家，欄=各商品（格內為款式+數量摘要），後接金額/收款/出貨/備註
function exportSummaryXls(gid){
  const g=getG(gid);if(!g)return;
  const bps=g.boxProducts||[];
  if(!bps.length){alert('尚無商品');return;}
  const confirmed=getConfirmedOrders(g);
  const pay=g.pay||{};
  const ship=g.ship||{};

  const byNick={};
  for(const o of confirmed){
    if(!byNick[o.nick])byNick[o.nick]={perBp:{},total:0,keys:[]};
    const b=byNick[o.nick];
    const bp=bps.find(p=>orderMatches(p,o)&&p.contents.includes(o.item));
    const bpKey=bp?bp.id:'_none';
    if(!b.perBp[bpKey])b.perBp[bpKey]={};
    b.perBp[bpKey][o.item]=(b.perBp[bpKey][o.item]||0)+o.qty;
    b.total+=o.qty*effPrice(g,o);
    b.keys.push(`${o.bpId||''}|||${o.item}|||${o.bind?1:0}|||${o.nick}`);
  }
  const nicks=Object.keys(byNick).sort((a,b)=>byNick[b].total-byNick[a].total);

  const css=`<style>
    td,th{border:1px solid #bbb;padding:4px 8px;font-size:11pt;font-family:Arial,sans-serif;white-space:nowrap}
    th{background:#9ec13f;color:#fff;font-weight:bold;text-align:center}
    .ctr{text-align:center}
    .num{text-align:right}
    .due{background:#f8cecc;color:#cc0000;font-weight:bold;text-align:right}
    .ok{background:#d5e8d4;color:#274e13;text-align:center}
  </style>`;

  let html=`<table cellspacing="0">
    <tr><td colspan="${bps.length+6}" style="font-size:14pt;font-weight:bold;border:none">${esc(g.name)} — 總表</td></tr>
    <tr><th>暱稱</th>${bps.map(p=>`<th>${esc(p.name)}</th>`).join('')}<th>總金額</th><th>已付金額</th><th>餘款</th><th>出貨狀況</th><th>備註</th></tr>`;
  for(const nick of nicks){
    const b=byNick[nick];
    const paid=(pay[nick]&&pay[nick].paid)||0;
    const total=payTotal(g,nick,b.total);
    const isOv=pay[nick]&&pay[nick].totalOv!=null;
    const diff=total-paid;
    const allShipped=b.keys.length&&b.keys.every(k=>ship[k]&&ship[k].s);
    html+=`<tr><td class="ctr" style="font-weight:bold">${esc(nick)}</td>`;
    for(const p of bps){
      const items=b.perBp[p.id]||{};
      const cell=Object.entries(items).map(([item,qty])=>{
        const single=p.contents.length===1&&p.contents[0]===p.name;
        return `${single?'':esc(item)}${qty}`;
      }).join('、');
      html+=`<td class="ctr">${cell||''}</td>`;
    }
    html+=`<td class="num">${total.toLocaleString()}${isOv?'*':''}</td>
      <td class="num">${paid?paid.toLocaleString():''}</td>
      <td class="${diff>0?'due':'ok'}">${diff>0?diff.toLocaleString():'已付清'}</td>
      <td class="ctr">${allShipped?'已出貨':'未出貨'}</td>
      <td>${esc((pay[nick]&&pay[nick].note)||'')}</td></tr>`;
  }
  const grandTotal=nicks.reduce((s,n)=>s+payTotal(g,n,byNick[n].total),0);
  const grandPaid=nicks.reduce((s,n)=>s+((pay[n]&&pay[n].paid)||0),0);
  html+=`<tr><td class="ctr" style="font-weight:bold">總計</td>${bps.map(()=>'<td></td>').join('')}
    <td class="num" style="font-weight:bold">${grandTotal.toLocaleString()}</td>
    <td class="num" style="font-weight:bold">${grandPaid.toLocaleString()}</td>
    <td class="num" style="font-weight:bold;color:#cc0000">${Math.max(0,grandTotal-grandPaid).toLocaleString()}</td>
    <td></td><td></td></tr>`;
  html+='</table>';

// Order CRUD
function bulkAdd(id){
  const text=$('#bulkIn').value.trim();if(!text)return;
  const lines=text.split('\n').filter(l=>l.trim());
  const g=getG(id);
  const parsed=[];
  const dupCheck={};
  for(const line of lines){
    const p=line.split(/[\/,，]/).map(s=>s.trim());if(p.length<2)continue;
    const nick=p[0],item=p[1];
    const bp=(g.boxProducts||[]).find(b=>b.contents.includes(item));
    const bpId=bp?bp.id:null;
    const key=nick+'|||'+item+'|||'+(bpId||'');
    if(dupCheck[key]){alert(`批次中 ${nick} 的「${item}」重複了`);return;}
    dupCheck[key]=true;
    if(g.orders.some(o=>!o.bind&&o.nick===nick&&o.item===item&&(o.bpId||null)===bpId)){alert(`${nick} 已經有「${item}」的喊單，不可重複`);return;}
    parsed.push(p);
  }
  let c=0;
  upG(id,g=>{for(const p of parsed){
    const bp=(g.boxProducts||[]).find(b=>b.contents.includes(p[1]));
    const bpId=bp?bp.id:null;
    const manualPrice=parseFloat(p[3])||0;
    const price=manualPrice||lookupPrice(g,p[1],bpId)||0;
    g.orders.push({id:g.nOid++,nick:p[0],item:p[1],series:'',qty:parseInt(p[2])||1,price,note:'',bpId,ts:Date.now()});c++;
  }});
  if(c){alert(`匯入 ${c} 筆`);render();}
}

function checkStock(g,itemName,addQty){
  if(g.type!=='carry')return null;
  const it=(g.items||[]).find(i=>i.name===itemName);
  if(!it||!it.stock)return null;
  const used=g.orders.filter(o=>o.item===itemName).reduce((s,o)=>s+o.qty,0);
  const remain=it.stock-used;
  if(addQty>remain) return {item:itemName,stock:it.stock,used,remain};
  return null;
}
function addMultiOrder(){
  const nick=$('#mON').value.trim();const _s=S();
  if(!nick){alert(`請填${_s.fieldNick}`);return;}
  const g=getG(_mGid);
  const rows=$('#mORows').querySelectorAll('.form-row');
  const entries=[];
  for(const row of rows){
    const itemEl=row.querySelector('.moI');
    const item=(itemEl?.value||'').trim();
    if(!item)continue;
    const bpEl=row.querySelector('.moBp');
    const bpId=bpEl?parseInt(bpEl.value)||null:null;
    const qty=parseInt(row.querySelector('.moQ')?.value)||1;
    const priceEl=row.querySelector('.moP');
    const price=priceEl?parseFloat(priceEl.value)||0:lookupPrice(g,item,bpId)||0;
    const note=(row.querySelector('.moNote')?.value||'').trim();
    entries.push({item,qty,price,note,bpId});
  }
  if(!entries.length){alert(`請至少填一筆${_s.fieldItem}`);return;}
  const seen=new Set();
  for(const e of entries){
    const key=e.item+'|||'+(e.bpId||'');
    if(seen.has(key)){alert(`同一筆喊單中「${e.item}」重複了`);return;}
    seen.add(key);
    if(g.orders.some(o=>!o.bind&&o.nick===nick&&o.item===e.item&&(o.bpId||null)===(e.bpId||null))){alert(`${nick} 已經有「${e.item}」的喊單，不可重複`);return;}
  }
  const isLift=!!$('#mOLift')?.checked;
  if(isLift){
    // 帶餘提配前提：該暱稱在該商品「未成團的配」裡有喊單（已成團的不算）
    for(const e of entries){
      const p=e.bpId?(g.boxProducts||[]).find(b=>b.id===e.bpId):(g.boxProducts||[]).find(b=>b.contents.includes(e.item));
      if(!p){alert(`「${e.item}」未對應任何商品，無法帶餘提配`);return;}
      if(!hasUnconfirmedOrders(g,p,nick)){alert(`${nick} 在「${p.name}」沒有未成團的喊單，無法帶餘提配`);return;}
    }
  }
  const contact=$('#mOContact')?.value.trim()||'';
  const url=$('#mOUrl')?.value.trim()||'';
  if(contact||url||_mShots.length)updateBuyer(nick,contact,url,_mShots);
  upG(_mGid,g=>{
    for(const e of entries){
      g.orders.push({id:g.nOid++,nick,item:e.item,series:'',qty:e.qty,price:e.price,note:e.note,bpId:e.bpId,lift:isLift,ts:Date.now()});
    }
  });
  closeModal();render();
}

function imgFileToData(f,cb,max){
  if(!f)return;
  max=max||500;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1,max/img.width);
      const cv=document.createElement('canvas');
      cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cb(cv.toDataURL('image/jpeg',0.75));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}

// Priority calc (carry)
let _lastPrioResult=null;
function calcPriority(gid){
  const g=getG(gid);if(!g.orders.length){$('#prioResult').innerHTML='<div class="empty">無喊單</div>';return;}
  const mode=$('#prioMode').value,passRule=$('#passRule').checked;
  const bO={};
  for(const o of g.orders){if(!bO[o.nick])bO[o.nick]=[];bO[o.nick].push({...o});}
  const tots={};
  for(const[nick,ords]of Object.entries(bO)){const q=ords.reduce((s,o)=>s+o.qty,0),a=ords.reduce((s,o)=>s+o.qty*effPrice(g,o),0);tots[nick]={q,a,score:mode==='quantity'?q:a};}
  const sorted=Object.keys(tots).sort((a,b)=>tots[b].score-tots[a].score);
  const stocks={};for(const it of(g.items||[])){if(it.stock>0)stocks[it.name]=it.stock;}
  const rem={...stocks};const hasL=Object.keys(stocks).length>0;
  const alloc={};
  for(const nick of sorted){alloc[nick]=[];for(const o of bO[nick]){const l=rem[o.item]!==undefined;let got=o.qty,lost=0;if(l){got=Math.min(o.qty,rem[o.item]);lost=o.qty-got;rem[o.item]-=got;}alloc[nick].push({item:o.item,want:o.qty,got,lost,limited:l,price:effPrice(g,o)});}}
  _lastPrioResult={gid,alloc,sorted};

  let h=`<div class="card"><h3>排名</h3><p class="muted" style="margin-bottom:8px">依${mode==='quantity'?'總數量':'總金額'}${passRule?' · 缺A pass B':''}</p>
    <div style="overflow-x:auto"><table><thead><tr><th>#</th><th>暱稱</th><th>總數量</th><th>總金額</th><th>分數</th></tr></thead><tbody>`;
  sorted.forEach((nick,i)=>{const t=tots[nick];h+=`<tr><td>${i+1}</td><td>${esc(nick)}</td><td>${t.q}</td><td>$${t.a.toLocaleString()}</td><td><span class="badge b-blue">${t.score}</span></td></tr>`;});
  h+=`</tbody></table></div></div>`;

  if(hasL){
    h+=`<div class="card"><h3>分配明細</h3>
      <div class="btn-row" style="margin-bottom:10px"><button class="bp" onclick="deductPriority()">扣除本次帶多結果</button>
      <button onclick="exportPrioXls()">匯出帶多結果</button>
      <span class="muted">從喊單中移除本次已分配的數量，方便進行下一輪計算</span></div>`;
    for(const nick of sorted){
      const hasLost=alloc[nick].some(a=>a.lost>0);
      h+=`<div style="margin-bottom:12px;padding:10px;background:#fef7fa;border-radius:8px"><div style="margin-bottom:6px"><strong>${esc(nick)}</strong> <span class="badge b-purple">#${sorted.indexOf(nick)+1}</span>`;
      if(passRule&&hasLost)h+=` <span class="badge b-amber">缺A pass B</span>`;

function deductPriority(){
  if(!_lastPrioResult){alert('請先計算帶多結果');return;}
  const{gid,alloc}=_lastPrioResult;
  if(!confirm('確定要扣除本次帶多結果？\n已分配到的數量會從喊單中扣除（數量減少或移除），庫存也會相應減少。'))return;
  upG(gid,g=>{
    for(const[nick,items]of Object.entries(alloc)){
      for(const a of items){
        if(a.got<=0)continue;
        let toDeduct=a.got;
        for(const o of g.orders){
          if(o.nick===nick&&o.item===a.item&&toDeduct>0){
            const take=Math.min(o.qty,toDeduct);
            o.qty-=take;toDeduct-=take;
          }
        }
        g.orders=g.orders.filter(o=>o.qty>0);
        const it=(g.items||[]).find(i=>i.name===a.item);
        if(it&&it.stock) it.stock=Math.max(0,it.stock-a.got);
      }
    }
  });
  _lastPrioResult=null;
  render();
}

// Export
function doExport(gid,type){
  const g=getG(gid);const st=S();
  if(type==='csv'){
    let csv=`${st.fieldNick},${st.fieldItem},${st.fieldQty},${st.fieldPrice},小計,${st.fieldNote},總金額\n`;
    const byN={};for(const o of getConfirmedOrders(g)){if(!byN[o.nick])byN[o.nick]=[];byN[o.nick].push(o);}
    const itemLabel=o=>{
      const bp=(g.boxProducts||[]).find(p=>orderMatches(p,o)&&p.contents.includes(o.item));
      return bpItemLabel(bp,o.item);
    };
    for(const[nick,ords]of Object.entries(byN)){
      const total=ords.reduce((s,o)=>s+o.qty*effPrice(g,o),0);
      ords.forEach((o,i)=>{
        const pr=effPrice(g,o);
        csv+=`${i===0?nick:''},${itemLabel(o)},${o.qty},${pr},${o.qty*pr},${o.note||''},${i===0?total:''}\n`;
      });
    }
    const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${g.name}.csv`;a.click();return;
  }
  const byB={};for(const o of getConfirmedOrders(g)){if(!byB[o.nick])byB[o.nick]=[];byB[o.nick].push(o);}
  let text=`=== ${g.name} (${getTypes()[g.type]?.label||''}) ===\n\n`;
  for(const[nick,ords]of Object.entries(byB)){
    text+=`【${nick}】\n`;let total=0;
    for(const o of ords){const pr=effPrice(g,o);const sub=o.qty*pr;text+=`  ${o.item} x${o.qty}`;if(pr)text+=` @$${pr} = $${sub}`;if(o.note)text+=` (${o.note})`;text+='\n';total+=sub;}
    if(total)text+=`  小計：$${total}\n`;text+='\n';
  }
  if(type==='copy'){navigator.clipboard.writeText(text).then(()=>alert('已複製'));return;}
  const box=$('#exportBox');if(box)box.innerHTML=`<div class="export-box">${esc(text)}</div>`;
}

function refreshPriceInputs(existing){
  const ta=$('#bpC');if(!ta)return;
  const contents=ta.value.trim().split(/[\n\/,，]/).map(s=>s.trim()).filter(Boolean);
  const container=$('#priceInputs');if(!container)return;
  if(!contents.length){container.innerHTML='<p class="muted">請先輸入款式</p>';return;}
  const avg=parseFloat($('#bpAvg')?.value)||0;
  let h='<div class="price-grid">';
  for(const c of contents){
    // 輸入的是相對均價的 ± 差額；編輯時由最終價換算回差額
    const val=existing&&existing[c]!=null?(existing[c]-avg):0;
    h+=`<label>${esc(c)}</label><input id="ip_${esc(c)}" type="number" value="${val}" placeholder="+5 / -5" oninput="updatePriceSummary()">`;
  }

}
function priceDiff(){
  const ta=$('#bpC');if(!ta)return 0;
  const contents=ta.value.trim().split(/[\n\/,，]/).map(s=>s.trim()).filter(Boolean);
  let total=0;
  for(const c of contents){const el=$('#ip_'+CSS.escape(c));total+=parseFloat(el?.value)||0;}
  return total;
}
function updatePriceSummary(){
  const box=$('#priceSummary');if(!box)return;
  const ta=$('#bpC');if(!ta)return;
  const contents=ta.value.trim().split(/[\n\/,，]/).map(s=>s.trim()).filter(Boolean);
  if(!contents.length){box.style.display='none';return;}
  const diff=priceDiff();
  box.style.display='block';
  box.innerHTML=Math.abs(diff)<0.01?'<span style="color:#3b6d11">合計 ±0</span>':`<span style="color:#a32d2d">合計 ${diff>0?'+':''}$${Math.round(diff)}（需為 ±0 才能儲存）</span>`;
}
function getBoxItemPrice(g,itemName){
  for(const p of (g.boxProducts||[])){
    if(p.adjustPrice && p.itemPrices && p.contents.includes(itemName)) return p.itemPrices[itemName]||null;
  }
  return null;
}
function lookupPrice(g,itemName,bpId){
  if(!itemName)return null;
  if(g.type==='carry'){const it=(g.items||[]).find(i=>i.name===itemName);if(it&&it.price)return it.price;}
  if(g.type==='box'){
    // 指定商品時只查該商品（款式名可跨商品重複）
    if(bpId){
      const p=(g.boxProducts||[]).find(b=>b.id===bpId);
      if(p){
        if(p.kind==='single')return p.unitPrice||null;
        if(p.adjustPrice&&p.itemPrices&&p.itemPrices[itemName]!=null)return p.itemPrices[itemName];
        return p.avgPrice||null;
      }
    }
    for(const p of(g.boxProducts||[])){if(p.kind==='single'&&p.contents.includes(itemName)&&p.unitPrice)return p.unitPrice;}
    const ap=getBoxItemPrice(g,itemName);if(ap!=null)return ap;
    for(const p of(g.boxProducts||[])){if(p.kind!=='single'&&p.contents.includes(itemName)&&p.avgPrice)return p.avgPrice;}
  }
  return null;
}
// 顯示用即時價格：拆盒/帶多以目前設定為準（調價後立即反映），一般代購用喊單時輸入的價格
function effPrice(g,o){
  if(g.type==='basic')return o.price||0;
  const p=lookupPrice(g,o.item,o.bpId);
  return p!=null?p:(o.price||0);
}
// 喊單時間顯示（舊喊單無記錄顯示 -）
function fmtTs(ts){
  if(!ts)return '-';
  const d=new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
// 喊單是否屬於某個拆盒/單領商品：新資料用 bpId 精準比對，舊資料退回名稱比對
function orderMatches(p,o){
  return o.bpId?o.bpId===p.id:p.contents.includes(o.item);
}
// 顯示用「商品-款式」標籤；單領以商品名為唯一款式時只顯示商品名
function bpItemLabel(bp,item){
  if(!bp)return item;
  if(bp.contents.length===1&&bp.contents[0]===bp.name)return bp.name;
  return `${bp.name}-${item}`;
}
// 已確認的喊單：拆盒商品只計入成團/含綁成團的配，單領與未對應喊單照原樣
function getConfirmedOrders(g){
  if(g.type!=='box'||!(g.boxProducts||[]).length)return g.orders;
  const res=[];const covered=new Set();
  for(const p of g.boxProducts){
    if(p.kind==='single'){
      for(const o of g.orders){if(p.contents.includes(o.item)&&orderMatches(p,o)){res.push(o);covered.add(o.id);}}
      continue;
    }
    for(const o of g.orders){if(p.contents.includes(o.item)&&orderMatches(p,o))covered.add(o.id);}
    const info=calcBoxes(g,p);
    const agg={};
    for(const box of info.boxes){
      if(box.status==='未成團')continue;
      for(const s of box){
        if(!s.buyer)continue;
        const key=s.buyer.nick+'|||'+s.item+'|||'+(s.buyer.bind?1:0);
        agg[key]=(agg[key]||0)+1;
      }
    }
    for(const[key,qty]of Object.entries(agg)){
      const[nick,item,bindF]=key.split('|||');
      res.push({nick,item,qty,price:lookupPrice(g,item,p.id)||0,note:bindF==='1'?'綁':'',bpId:p.id,bind:bindF==='1'});
    }
  }
  for(const o of g.orders){if(!covered.has(o.id))res.push(o);}
  return res;
}

function normText(s){
  let i=0;const nums=[];
  const tpl=s.replace(/[\d][\d,.]*/g,m=>{nums.push(m);return `{${++i}}`;});
  return{tpl,nums};
}
function loadTextOv(){
  if(RO)return window.VIEWER_TEXTOV||{};
  return JSON.parse(localStorage.getItem('gp_text_overrides')||'{}');
}
function applyTextOverrides(){
  const map=loadTextOv();
  if(!Object.keys(map).length)return;
  for(const rootId of['app','modalContent']){
    const root=document.getElementById(rootId);if(!root)continue;
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);
    const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);
    for(const n of nodes){
      const s=n.nodeValue;if(!s||!s.trim())continue;
      const{tpl,nums}=normText(s);
      const ov=map[tpl];if(!ov||ov===tpl)continue;
      n.nodeValue=ov.replace(/\{(\d+)\}/g,(m,i)=>nums[i-1]!==undefined?nums[i-1]:m);
    }
  }
}
let _editMode=false;
function toggleEditMode(){
  _editMode=!_editMode;
  const btn=document.getElementById('editTextBtn');
  btn.style.background=_editMode?'#a32d2d':'';
  btn.style.color=_editMode?'#fff':'';
  btn.textContent=_editMode?'✏ 編輯中（點文字修改，再按一次結束）':'✏ 修改頁面內容';
}
function editElementText(el){
  const tns=[...el.childNodes].filter(n=>n.nodeType===3&&n.nodeValue.trim());
  if(!tns.length)return;
  const full=tns.map(n=>n.nodeValue).join('');
  const{tpl}=normText(full);
  const map=loadTextOv();
  // 若目前顯示的已是覆寫後文字，找回原始 key
  let key=tpl;
  for(const[k,v]of Object.entries(map)){if(v===tpl){key=k;break;}}
  const cur=map[key]||tpl;
  const input=prompt('修改文字（{1}、{2} 等代表會變動的數字，請保留）：',cur);
  if(input===null)return;
  const val=input.trim();
  if(!val||val===key)delete map[key];
  else map[key]=val;
  localStorage.setItem('gp_text_overrides',JSON.stringify(map));
  render();
}
document.addEventListener('click',e=>{
  if(!_editMode)return;
  if(e.target.closest('#editTextBtn'))return;
  e.preventDefault();e.stopPropagation();
  editElementText(e.target);
},true);
(function(){
  const btn=document.createElement('button');
  btn.id='editTextBtn';
  btn.textContent='✏ 修改頁面內容';
  btn.style.cssText='position:fixed;right:16px;bottom:16px;z-index:998;padding:8px 14px;border:1px solid #f0d7e2;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;box-shadow:0 2px 10px rgba(0,0,0,.12)';
  btn.onclick=toggleEditMode;
  document.body.appendChild(btn);
})();
// 唯讀模式：移除所有編輯用的按鈕與點擊行為（白名單內的瀏覽操作保留）
function stripEditUI(){
  if(!RO)return;
  const ok=/^\s*(goGroup|goHome|homeFilter|tab='|toggleBpDetail|showImg|event\.stopPropagation\(\);showImg|closeModal|showShipModal|_sp(Nick|Gid|Hide)|doExport|exportXls|exportSummaryXls|if\(event\.target)/;
  document.querySelectorAll('[onclick]').forEach(el=>{
    const oc=el.getAttribute('onclick')||'';
    if(ok.test(oc))return;
    if(el.tagName==='BUTTON')el.remove();
    else{el.removeAttribute('onclick');el.style.cursor='default';el.title='';}
  });
}

// render 與 modal 後自動套用文字覆寫（唯讀模式再清除編輯介面）
const _renderCore=render;
render=function(){_renderCore();applyTextOverrides();stripEditUI();};
const _openModalCore=openModal;
openModal=function(html){_openModalCore(html);applyTextOverrides();stripEditUI();};

if(RO){
  document.body.classList.add('ro');
  const s=document.createElement('style');
  s.textContent='body.ro .slot-del{display:none!important}body.ro .gear-btn{display:none!important}body.ro #editTextBtn{display:none!important}body.ro .slot-empty{cursor:default!important}body.ro .slot-empty:hover{background:#fdf1f6!important}';
  document.head.appendChild(s);
}
render();applyTheme();
</script>
